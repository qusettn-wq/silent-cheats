<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Cheats</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">SILENT<span>CHEATS</span></div>
        <nav>
            <a href="#home" class="nav-link">Home</a>
            <a href="#status" class="nav-link">Status</a>
            <a href="https://discord.gg/GzDdWYTnqX" target="_blank" class="nav-btn-discord">Discord</a>
        </nav>
    </header>

    <main class="hero" id="home">
        <div class="hero-bg-glow"></div>
        <section class="hero-content">
            <h1 class="hero-title">Zdominuj grę z <br> <span class="purple-glow" data-text="Silent Cheats">Silent Cheats</span></h1>
            <p class="hero-subtitle">Niewykrywalne i wydajne oprogramowanie do Minecraft oraz Counter-Strike 2.</p>
            <div class="hero-actions">
                <a href="https://discord.gg/GzDdWYTnqX" target="_blank" class="btn-primary">Dołącz do Discorda</a>
                <a href="#status" class="btn-secondary">Zobacz Status</a>
            </div>
        </section>
    </main>

    <section class="status-section" id="status">
        <h2 class="section-title">System Status</h2>
        <div class="cards-wrapper">
            <div class="status-card">
                <h3>Minecraft</h3>
                <div class="status-tag">UNDETECTED</div>
            </div>
            <div class="status-card">
                <h3>Counter-Strike 2</h3>
                <div class="status-tag">UNDETECTED</div>
            </div>
        </div>
    </section>

    <script src="skript.js"></script>
</body>
</html>
